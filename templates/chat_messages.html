<div class="chat-wrapper space-y-3" id="messages-container" hx-swap-oob="true">
    {% for msg in chat_history %}
        {% if msg.role == 'user' %}
        <div class="flex justify-end fade-in">
            <div class="flex items-end gap-2 max-w-[70%]">
                <div class="bg-gradient-to-br from-[#FF922B] to-[#FF8C42] text-white px-5 py-4 rounded-2xl rounded-br-md shadow-md">
                    <p class="text-sm leading-relaxed">{{ msg.content }}</p>
                    <p class="text-xs opacity-60 text-right mt-2">{{ msg.time }}</p>
                </div>
                <div class="w-9 h-9 rounded-full bg-[#FF922B] flex items-center justify-center text-white flex-shrink-0">👤</div>
            </div>
        </div>
        {% else %}
        <div class="flex justify-start fade-in">
            <div class="flex items-end gap-2 max-w-[70%]">
                <div class="w-9 h-9 rounded-full bg-[#FFE4CC] flex items-center justify-center flex-shrink-0">🧸</div>
                <div class="bg-white border border-[#FFE4CC] px-5 py-4 rounded-2xl rounded-bl-md shadow-md">
                    <p class="text-sm leading-relaxed text-[#2D1B00]">{{ msg.content | safe }}</p>
                    <p class="text-xs text-[#8B6914] mt-2">{{ msg.time }}</p>
                </div>
            </div>
        </div>
        {% endif %}
    {% endfor %}
    
    {% if streaming %}
    <!-- SSE streaming target -->
    <div id="sse-target"
         hx-ext="sse"
         sse-connect="/chat/stream"
         sse-swap="message"
         hx-swap="beforeend">
        <!-- Typing indicator is replaced by the first SSE message event -->
        <div id="typing-indicator" class="flex justify-start">
            <div class="flex items-end gap-2 max-w-[70%]">
                <div class="w-9 h-9 rounded-full bg-[#FFE4CC] flex items-center justify-center flex-shrink-0">🧸</div>
                <div class="bg-white border border-[#FFE4CC] px-5 py-4 rounded-2xl rounded-bl-md shadow-md">
                    <div class="flex items-center gap-1.5">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <span class="text-sm text-[#8B6914] italic ml-2">Teddy is thinking...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endif %}
</div>

<script>
    document.body.addEventListener('htmx:sseClose', function() {
        setTimeout(() => { window.location.reload(); }, 500);
    });
</script>
