{% extends "base.html" %}
{% block title %}Admin Login 📊{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-lg border border-[#FFE4CC] max-w-sm w-full">
        <div class="text-center mb-6">
            <div class="text-5xl mb-2">📊</div>
            <h1 class="text-2xl font-bold text-[#2D1B00]">Admin Access</h1>
        </div>
        <form hx-post="/admin/login" hx-target="#login-error" hx-swap="innerHTML">
            <input type="password" name="password" placeholder="Enter admin password" 
                   class="w-full px-4 py-3 rounded-xl border-2 border-[#FFE4CC] focus:outline-none focus:border-[#FF922B] text-center text-lg"
                   autofocus>
            <button type="submit" class="w-full mt-4 bg-[#FF922B] text-white py-3 rounded-xl font-semibold hover:bg-[#FF8C42] transition">
                Login
            </button>
        </form>
        <div id="login-error" class="mt-3 text-center"></div>
    </div>
</div>
{% endblock %}
