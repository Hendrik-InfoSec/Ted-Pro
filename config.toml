# .streamlit/config.toml

[server]
headless = true
# keeps the app snappy on Cloud
enableXsrfProtection = true
enableCORS = false

[browser]
gatherUsageStats = false

[client]
# trims the viewer toolbar; CSS will hide the rest
toolbarMode = "minimal"

[theme]
base = "light"
primaryColor = "#FF6F31"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#FFF6EA"
textColor = "#2f1b0e"
